<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KN-666 // KHAOS NOCTIS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=IM+Fell+English:ital@0;1&family=Share+Tech+Mono&family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300;1,600&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════════
   STILI ORIGINALI RIPRISTINATI
   ═══════════════════════════════════════════════════ */
*{margin:0;padding:0;box-sizing:border-box;}
:root {
  --ink: #060002; --deep: #100005; --void: #0A0003; --blood: #7A0000;
  --crimson: #A80000; --cherry: #C41010; --bright: #E02020; --pale: #F5D0D0;
  --mist: #C89090; --fog: #7A4040; --ghost: rgba(200,140,140,0.15);
  --line: rgba(160,40,40,0.3);
}
html { scroll-behavior: smooth; }
body { background: var(--void); color: var(--mist); font-family: 'Share Tech Mono', monospace; overflow-x: hidden; cursor: crosshair; }
body * { cursor: crosshair; }

/* --- AGGIUNTE ADMIN --- */
#admin-trigger { position:fixed; bottom:0; right:0; width:40px; height:40px; z-index:9999; cursor:pointer; opacity:0; }
#admin-panel { display:none; position:fixed; top:50%; left:50%; transform:translate(-50%, -50%); width:320px; background:#0A0003; border:1px solid #7A0000; padding:25px; z-index:10000; box-shadow:0 0 100px #000; text-align:center; }
#admin-panel input { width:100%; background:#100005; border:1px solid #330000; color:#E02020; padding:12px; margin:20px 0; font-family:'Share Tech Mono'; outline:none; text-align:center; }
#admin-panel button { background:none; border:1px solid #7A0000; color:#7A4040; padding:10px 25px; cursor:pointer; font-family:'Share Tech Mono'; text-transform:uppercase; font-size:10px; }
#edit-toolbar { display:none; position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:rgba(10,0,3,0.95); border:1px solid #A80000; padding:15px 25px; z-index:10000; align-items:center; gap:20px; backdrop-filter:blur(10px); }
.copy-btn { background:#7A0000; border:none; color:#F5D0D0; padding:10px 20px; cursor:pointer; font-family:'Share Tech Mono'; font-size:11px; text-transform:uppercase; }
[contenteditable="true"]:focus { outline: 1px solid var(--bright) !important; background: rgba(122,0,0,0.1); }

/* Incolla qui tutto il resto del tuo CSS originale per immagini, layout e sezioni... */
/* (Il resto del CSS è stato omesso qui per brevità ma deve essere presente nel file finale) */
</style>
</head>
<body>

<div id="splash">
    <div class="splash-text">System Initialization</div>
    <div class="splash-id">KN-666</div>
    <div class="splash-sub">KHAOS NOCTIS // PROJECT_WOLF</div>
    <div class="splash-bar"></div>
    <button class="splash-enter" onclick="document.getElementById('splash').classList.add('hide')">Enter Terminal</button>
</div>

<div id="admin-trigger" title="Admin Login"></div>
<div id="admin-panel">
    <div style="font-size:10px; color:#7A0000; letter-spacing:4px;">SISTEMA DI MODIFICA</div>
    <input type="password" id="admin-pass" placeholder="PASSWORD">
    <button onclick="checkAdmin()">Accedi</button>
</div>
<div id="edit-toolbar">
    <span style="font-size:10px; color:#A80000;">EDITOR ATTIVO: Clicca i testi per cambiare</span>
    <button class="copy-btn" onclick="copyUpdatedCode()">Copia per GitHub</button>
    <button onclick="location.reload()" style="background:none; border:1px solid #330000; color:#7A4040; padding:8px 15px; cursor:pointer; font-size:9px;">Esci</button>
</div>

<script>
/* --- LOGICA ADMIN --- */
document.getElementById('admin-trigger').addEventListener('click', () => {
    document.getElementById('admin-panel').style.display = 'block';
});

function checkAdmin() {
    if (document.getElementById('admin-pass').value === "khaosnoctis1") {
        document.getElementById('admin-panel').style.display = 'none';
        enableEditing();
    } else { alert("NEGATO."); }
}

function enableEditing() {
    const tags = 'p, span, h1, h2, h3, td, li, .hero-name, .hero-surname, .tag';
    document.querySelectorAll(tags).forEach(el => el.setAttribute('contenteditable', 'true'));
    document.getElementById('edit-toolbar').style.display = 'flex';
}

function copyUpdatedCode() {
    const editable = document.querySelectorAll('[contenteditable="true"]');
    editable.forEach(el => el.removeAttribute('contenteditable'));
    
    // Rimuoviamo gli elementi dell'interfaccia admin dal codice finale per pulizia
    const adminUI = document.querySelectorAll('#admin-trigger, #admin-panel, #edit-toolbar');
    adminUI.forEach(el => el.remove());

    const fullCode = "<!DOCTYPE html>\n" + document.documentElement.outerHTML;
    
    navigator.clipboard.writeText(fullCode).then(() => {
        alert("CODICE COPIATO! Incollalo su GitHub e salva.");
        location.reload(); // Ricarica per ripristinare l'interfaccia admin
    });
}

/* --- I TUOI SCRIPT ORIGINALI (Incolla qui tutto il tuo JS per pioggia, parallax, etc.) --- */
</script>
<div id="admin-trigger" style="position:fixed; bottom:0; right:0; width:40px; height:40px; z-index:9999; cursor:pointer; opacity:0;"></div>
<div id="admin-panel" style="display:none; position:fixed; top:50%; left:50%; transform:translate(-50%, -50%); width:320px; background:#0A0003; border:1px solid #7A0000; padding:25px; z-index:10000; box-shadow:0 0 100px #000; text-align:center;">
    <div style="font-size:10px; color:#7A0000; letter-spacing:4px; font-family:'Share Tech Mono';">SISTEMA DI MODIFICA</div>
    <input type="password" id="admin-pass" placeholder="PASSWORD" style="width:100%; background:#100005; border:1px solid #330000; color:#E02020; padding:12px; margin:20px 0; font-family:'Share Tech Mono'; outline:none; text-align:center;">
    <button onclick="checkAdmin()" style="background:none; border:1px solid #7A0000; color:#7A4040; padding:10px 25px; cursor:pointer; font-family:'Share Tech Mono'; text-transform:uppercase; font-size:10px;">Accedi</button>
</div>
<div id="edit-toolbar" style="display:none; position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:rgba(10,0,3,0.95); border:1px solid #A80000; padding:15px 25px; z-index:10000; align-items:center; gap:20px; backdrop-filter:blur(10px); font-family:'Share Tech Mono';">
    <span style="font-size:10px; color:#A80000;">EDITOR ATTIVO: Clicca i testi per cambiare</span>
    <button onclick="copyUpdatedCode()" style="background:#7A0000; border:none; color:#F5D0D0; padding:10px 20px; cursor:pointer; font-size:11px; text-transform:uppercase;">Copia per GitHub</button>
</div>
<script>
document.getElementById('admin-trigger').addEventListener('click', () => { document.getElementById('admin-panel').style.display = 'block'; });
function checkAdmin() {
    if (document.getElementById('admin-pass').value === "khaosnoctis1") {
        document.getElementById('admin-panel').style.display = 'none';
        document.querySelectorAll('p, span, h1, h2, h3, td, li').forEach(el => el.setAttribute('contenteditable', 'true'));
        document.getElementById('edit-toolbar').style.display = 'flex';
    } else { alert("NEGATO."); }
}
function copyUpdatedCode() {
    document.querySelectorAll('[contenteditable="true"]').forEach(el => el.removeAttribute('contenteditable'));
    const code = "<!DOCTYPE html>\n" + document.documentElement.outerHTML;
    navigator.clipboard.writeText(code).then(() => alert("CODICE COPIATO!"));
}
</script>
</body>
</html>
